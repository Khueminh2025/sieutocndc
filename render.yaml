services:
  - type: web
    name: sieutoc-printing
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run_migrate.py && gunicorn sieutoc_printing.wsgi:application"
    preDeployCommand: "python manage.py migrate && python manage.py loaddata fixtures_sieutoc_printing_clean.json"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: sieutoc_printing.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sieutoc-db
          property: connectionString

databases:
  - name: sieutoc-db
    plan: free
