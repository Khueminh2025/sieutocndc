services:
  - type: web
    name: sieutoc-printing
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn sieutoc_printing.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: sieutoc_printing.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sieutoc-db
          property: connectionString

databases:
  - name: sieutoc-db
    plan: free
