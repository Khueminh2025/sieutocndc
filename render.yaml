services:
  - type: web
    name: sieutoc-printing
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn sieutoc_printing.wsgi"
    preDeployCommand: "python manage.py collectstatic --noinput && python run_migrate.py"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: sieutoc_printing.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sieutoc-db
          property: connectionString

databases:
  - name: sieutoc-db
    plan: free
